# Production compose on VPS — Postgres/Redis run separately (or use docker-compose.yml)
# DOCKER_IMAGE is set by deploy workflow, e.g. ghcr.io/aftab-alam-devops/seo-analyzer-api:latest

services:
  api:
    image: ${DOCKER_IMAGE}
    container_name: seo_analyzer_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
