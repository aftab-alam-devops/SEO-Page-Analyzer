# Production on VPS — API + Web (Nginx). Postgres/Redis run separately.
# Set DOCKER_IMAGE_API and DOCKER_IMAGE_WEB in .env or via deploy workflow exports.

services:
  api:
    image: ${DOCKER_IMAGE_API}
    container_name: seo_analyzer_api
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8000"
    networks:
      - seo_net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    image: ${DOCKER_IMAGE_WEB}
    container_name: seo_analyzer_web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - seo_net

networks:
  seo_net:
    driver: bridge
