# Production docker-compose for VPS
services:
  postgres:
    image: postgres:16-alpine
    container_name: seo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: seo_user
      POSTGRES_PASSWORD: seo_password
      POSTGRES_DB: seo_analyzer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seo_user -d seo_analyzer"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: seo_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ${DOCKER_IMAGE_API}
    container_name: seo_analyzer_api
    restart: unless-stopped
    expose:
      - "8088"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://seo_user:seo_password@postgres:5432/seo_analyzer
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=https://aftab-fastapi.duckdns.org,http://aftab-fastapi.duckdns.org,http://35.174.167.153,http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8088/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    image: ${DOCKER_IMAGE_WEB}
    container_name: seo_analyzer_web
    restart: unless-stopped
    ports:
      - "5077:80"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: seo_prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.external-url=/prometheus/'
      - '--web.route-prefix=/'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    # Port 9090 is kept internal for security, accessible only via Grafana/Docker network.
    depends_on:
      api:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.4.0
    container_name: seo_grafana
    restart: unless-stopped
    environment:
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    # Port 3000 is kept internal for security, reverse proxied through Nginx on port 80.
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
