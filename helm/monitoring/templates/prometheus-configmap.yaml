apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'fastapi-seo-analyzer'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['api:8088']
